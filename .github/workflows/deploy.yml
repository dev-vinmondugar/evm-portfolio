name: EVM Portfolio Updates Automation

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Assets to S3 and HTML to EC2
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Authenticate with AWS for S3 Uploads
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      # Step 3: Sync the assets folder to S3
      # Replace 'your-target-s3-bucket-name' with your actual bucket name
      - name: Sync Assets Folder to S3
        run: |
          aws s3 sync ./assets/ s3://evm-portfolio-assets/assets/ --delete

      # Step 4: Deploy index.html to EC2 via SSH
      - name: Deploy index.html to EC2
        env:
          PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ubuntu
        run: |
          # 1. Setup the private key inside the GitHub runner environment
          echo "$PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          # 2. Securely copy index.html to the staging area (/tmp) on EC2
          scp -o StrictHostKeyChecking=no -i private_key.pem ./index.html $USER@$HOST:/tmp/index.html

          # 3. Remote into EC2, move the file with sudo, and correct the ownership permissions
          ssh -o StrictHostKeyChecking=no -i private_key.pem $USER@$HOST "
            sudo mv /tmp/index.html /var/www/html/index.html && \
            sudo chown www-data:www-data /var/www/html/index.html && \
            sudo chmod 644 /var/www/html/index.html
          "

          # 4. Clean up the key from the runner
          rm private_key.pem